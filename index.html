  <div id="root"></div>

  <!-- Script con tipo text/babel para compilar el código React/JSX en vivo -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const SYMBOLS = [
      { id: "1HZ50V",  label: "V50 1s",  color: "#00E5FF" },
      { id: "1HZ75V",  label: "V75 1s",  color: "#7C4DFF" },
      { id: "1HZ100V", label: "V100 1s", color: "#FF4081" },
    ];

    const DERIV_WS = "wss://ws.binaryws.com/websockets/v3?app_id=1089";

    // ─── Estructura de mercado adaptada a ventana variable por Timeframe ───────────
    function detectStructure(candles, windowSize = 3) {
      if (!candles || candles.length < 15) return null;
      const closes = candles.map(c => parseFloat(c.close));
      const highs  = candles.map(c => parseFloat(c.high));
      const lows   = candles.map(c => parseFloat(c.low));
      const n = closes.length;

      const swingHighs = [];
      const swingLows = [];

      let leftOffsets, rightOffsets;
      if (windowSize === 5) {
        leftOffsets = [-2, -1];
        rightOffsets = [1, 2];
      } else if (windowSize === 4) {
        leftOffsets = [-2, -1];
        rightOffsets = [1];
      } else { 
        leftOffsets = [-1];
        rightOffsets = [1];
      }

      const maxOffset = 2;

      for (let i = maxOffset; i < n - maxOffset; i++) {
        let isHigh = true;
        for (const o of leftOffsets) {
          if (highs[i] <= highs[i + o]) { isHigh = false; break; }
        }
        if (isHigh) {
          for (const o of rightOffsets) {
            if (highs[i] <= highs[i + o]) { isHigh = false; break; }
          }
        }
        if (isHigh) swingHighs.push({ i, v: highs[i] });

        let isLow = true;
        for (const o of leftOffsets) {
          if (lows[i] >= lows[i + o]) { isLow = false; break; }
        }
        if (isLow) {
          for (const o of rightOffsets) {
            if (lows[i] >= lows[i + o]) { isLow = false; break; }
          }
        }
        if (isLow) swingLows.push({ i, v: lows[i] });
      }

      const swingStrength = swingHighs.length + swingLows.length;

      let trend = "lateral";
      if (swingHighs.length >= 2 && swingLows.length >= 2) {
        const hh = swingHighs[swingHighs.length-1].v > swingHighs[swingHighs.length-2].v;
        const hl = swingLows[swingLows.length-1].v  > swingLows[swingLows.length-2].v;
        const lh = swingHighs[swingHighs.length-1].v < swingHighs[swingHighs.length-2].v;
        const ll = swingLows[swingLows.length-1].v   < swingLows[swingLows.length-2].v;
        if (hh && hl) trend = "alcista";
        else if (lh && ll) trend = "bajista";
      }

      const lastClose = closes[n-1];
      const penultimateSwingHigh = swingHighs.length >= 2 ? swingHighs[swingHighs.length-2].v : null;
      const penultimateSwingLow  = swingLows.length >= 2  ? swingLows[swingLows.length-2].v  : null;
      
      let bos = null;
      if (penultimateSwingHigh && lastClose > penultimateSwingHigh) bos = "alcista";
      if (penultimateSwingLow  && lastClose < penultimateSwingLow)  bos = "bajista";

      let choch = null;
      if (swingHighs.length >= 2 && swingLows.length >= 2) {
        const prevTrend = (() => {
          const hh = swingHighs[swingHighs.length-2]?.v > swingHighs[swingHighs.length-3]?.v;
          const hl = swingLows[swingLows.length-2]?.v   > swingLows[swingLows.length-3]?.v;
          if (hh && hl) return "alcista";
          const lh = swingHighs[swingHighs.length-2]?.v < swingHighs[swingHighs.length-3]?.v;
          const ll = swingLows[swingLows.length-2]?.v   < swingLows[swingLows.length-3]?.v;
          if (lh && ll) return "bajista";
          return "lateral";
        })();
        if (prevTrend !== trend && prevTrend !== "lateral" && trend !== "lateral") choch = trend;
      }

      const demandZone = swingLows.length ? swingLows[swingLows.length-1].v : null;
      const supplyZone = swingHighs.length ? swingHighs[swingHighs.length-1].v : null;

      let rsi = null;
      if (closes.length >= 16) {
        let g = 0, l = 0;
        for (let i = 1; i <= 14; i++) { const d = closes[i] - closes[i-1]; if (d > 0) g += d; else l -= d; }
        let ag = g / 14, al = l / 14;
        for (let i = 15; i < closes.length; i++) {
          const d = closes[i] - closes[i-1];
          ag = (ag * 13 + (d > 0 ? d : 0)) / 14;
          al = (al * 13 + (d < 0 ? -d : 0)) / 14;
        }
        rsi = al === 0 ? 100 : Math.round((100 - 100 / (1 + ag / al)) * 10) / 10;
      }

      return { trend, bos, choch, demandZone, supplyZone, lastClose, swingHighs, swingLows, swingStrength, rsi };
    }

    // ─── Arquitectura de Filtros de Señal Sniper en Cascada ──────────────────────
    function getSniperSignal(h1, m15, m5) {
      if (!h1 || !m15 || !m5) return null;

      if (h1.trend !== "alcista" && h1.trend !== "bajista") return null;
      const targetTrend = h1.trend;

      if (m15.trend !== targetTrend) return null;

      if (!m15.bos || m15.bos !== targetTrend) return null;
      if (m15.swingStrength < 4) return null;

      const price = m5.lastClose;
      if (targetTrend === "alcista") {
        if (!h1.demandZone) return null;
        const diff = Math.abs(price - h1.demandZone) / h1.demandZone;
        if (diff > 0.002) return null;
      } else {
        if (!h1.supplyZone) return null;
        const diff = Math.abs(price - h1.supplyZone) / h1.supplyZone;
        if (diff > 0.002) return null;
      }

      const m5Confirmed = (m5.bos === targetTrend) || (m5.choch === targetTrend);
      if (!m5Confirmed) return null;

      const trigger = m5.choch === targetTrend ? "CHoCH" : "BOS";
      return {
        direction: targetTrend === "alcista" ? "COMPRA" : "VENTA",
        trigger: trigger,
        color: targetTrend === "alcista" ? "#00E676" : "#FF5252"
      };
    }

    // ─── Sparkline en Miniatura para tarjetas ─────────────────────────────────────
    function Sparkline({ data, color }) {
      if (!data || data.length < 2) return <div style={{height:48,display:"flex",alignItems:"center",justifyContent:"center",color:"#333",fontSize:11}}>sin datos</div>;
      const vals = data.map(d => parseFloat(d.close));
      const min = Math.min(...vals), max = Math.max(...vals);
      const range = max - min || 1;
      const W = 160, H = 48;
      const pts = vals.map((v, i) => `${(i / (vals.length-1)) * W},${H - ((v - min) / range) * (H-4) - 2}`).join(" ");
      const rising = vals[vals.length-1] > vals[0];
      return (
        <svg width={W} height={H} style={{overflow:"visible"}}>
          <defs>
            <linearGradient id={`sg-${color.replace("#","")}`} x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.35"/>
              <stop offset="100%" stopColor={color} stopOpacity="0"/>
            </linearGradient>
          </defs>
          <polygon points={`0,${H} ${pts} ${W},${H}`} fill={`url(#sg-${color.replace("#","")})`}/>
          <polyline points={pts} fill="none" stroke={rising ? "#00E676" : "#FF5252"} strokeWidth="1.5" strokeLinejoin="round"/>
          <circle cx={(vals.length-1)/(vals.length-1)*W} cy={H - ((vals[vals.length-1]-min)/range)*(H-4)-2} r="3" fill={rising?"#00E676":"#FF5252"}/>
        </svg>
      );
    }

    // ─── Indicador Visual de Mira Sniper ─────────────────────────────────────────
    function SniperScopeIndicator({ active, color }) {
      return (
        <div style={{
          position: "relative", width: 56, height: 56, borderRadius: "50%",
          border: `2px dashed ${active ? color : "rgba(255,255,255,0.1)"}`,
          display: "flex", alignItems: "center", justifyContent: "center",
          boxShadow: active ? `0 0 16px ${color}33` : "none",
          transition: "all 0.3s ease", flexShrink: 0
        }}>
          <div style={{ position: "absolute", width: "100%", height: 1, background: active ? color : "rgba(255,255,255,0.1)", opacity: 0.3 }} />
          <div style={{ position: "absolute", height: "100%", width: 1, background: active ? color : "rgba(255,255,255,0.1)", opacity: 0.3 }} />
          <div style={{
            width: 8, height: 8, borderRadius: "50%",
            background: active ? color : "rgba(255,255,255,0.2)",
            boxShadow: active ? `0 0 8px ${color}` : "none",
            transition: "background 0.3s"
          }} />
        </div>
      );
    }

    // ─── Mini Chart de Tendencia en Vivo del Panel ────────────────────────────────
    function LiveTrendChart({ m5Data, tipColor }) {
      if (!m5Data || m5Data.length < 2) {
        return (
          <div style={{ height: 60, display: "flex", alignItems: "center", justifyContent: "center", color: "rgba(255,255,255,0.2)", fontSize: 11 }}>
            Cargando datos en tiempo real…
          </div>
        );
      }
      const vals = m5Data.map(d => parseFloat(d.close));
      const min = Math.min(...vals), max = Math.max(...vals);
      const range = max - min || 1;
      const W = 800, H = 60;

      const pts = vals.map((v, i) => {
        const x = (i / (vals.length - 1)) * W;
        const y = H - ((v - min) / range) * (H - 8) - 4;
        return `${x},${y}`;
      }).join(" ");

      const lastY = H - ((vals[vals.length - 1] - min) / range) * (H - 8) - 4;

      return (
        <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ overflow: "visible" }}>
          <defs>
            <linearGradient id="live-grad" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%" stopColor={tipColor} stopOpacity="0.12"/>
              <stop offset="100%" stopColor={tipColor} stopOpacity="0"/>
            </linearGradient>
          </defs>
          <polygon points={`0,${H} ${pts} ${W},${H}`} fill="url(#live-grad)" />
          <polyline points={pts} fill="none" stroke="rgba(255,255,255,0.25)" strokeWidth="1.5" strokeLinejoin="round" />
          <circle cx={W} cy={lastY} r="5" fill={tipColor} style={{ filter: `drop-shadow(0 0 6px ${tipColor})` }} />
        </svg>
      );
    }

    // ─── Tarjeta de Símbolo Individual ──────────────────────────────────────────
    function SymbolCard({ sym, data, livePrice }) {
      const h1  = data?.h1  ? detectStructure(data.h1, 5)  : null;
      const m15 = data?.m15 ? detectStructure(data.m15, 4) : null;
      const m5  = data?.m5  ? detectStructure(data.m5, 3)  : null;

      const signal = getSniperSignal(h1, m15, m5);
      const loading = !data?.h1;

      const trendIcon = t => t === "alcista" ? "▲" : t === "bajista" ? "▼" : "→";
      const trendCol  = t => t === "alcista" ? "#00E676" : t === "bajista" ? "#FF5252" : "#FFD740";

      const getRsiColor = (val) => {
        if (val >= 70 || val <= 30) return "#FF9100";
        if (val >= 40 && val <= 60) return "#00E5FF";
        return "rgba(255, 255, 255, 0.5)";
      };

      return (
        <div style={{
          background:"linear-gradient(135deg,rgba(255,255,255,0.04) 0%,rgba(255,255,255,0.01) 100%)",
          border:`1px solid ${loading ? "rgba(255,255,255,0.08)" : signal ? `${signal.color}44` : "rgba(255,255,255,0.08)"}`,
          borderRadius:16,padding:"18px 20px",display:"flex",flexDirection:"column",gap:14,
          backdropFilter:"blur(12px)",transition:"border-color 0.4s",
          boxShadow: signal ? `0 0 24px ${signal.color}11` : "none"
        }}>
          {/* Cabecera */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:sym.color,boxShadow:`0 0 8px ${sym.color}`}}/>
              <span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:17,color:"#fff",letterSpacing:"0.04em"}}>{sym.label}</span>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:15,fontWeight:600,color:"#fff",letterSpacing:"0.02em",fontVariantNumeric:"tabular-nums"}}>
                {livePrice ? parseFloat(livePrice).toFixed(2) : "—"}
              </div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"0.06em",marginTop:1}}>PRECIO VIVO</div>
            </div>
          </div>

          {loading ? (
            <div style={{display:"flex",alignItems:"center",gap:8,color:"rgba(255,255,255,0.3)",fontSize:12}}>
              <div style={{width:12,height:12,border:"1.5px solid rgba(255,255,255,0.2)",borderTopColor:sym.color,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
              Cargando datos…
            </div>
          ) : (
            <>
              {/* Sparkline */}
              <Sparkline data={data?.m5?.slice(-40)} color={sym.color}/>

              {/* Sniper Signal Indicator */}
              <div style={{display:"flex",alignItems:"center",gap:14,background:"rgba(255,255,255,0.01)",borderRadius:12,padding:"8px 12px",border:"0.5px solid rgba(255,255,255,0.04)"}}>
                <SniperScopeIndicator active={!!signal} color={signal?.color}/>
                <div style={{flex:1}}>
                  {signal ? (
                    <>
                      <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.12em",color:signal.color,marginBottom:2}}>{signal.direction} DETECTADA</div>
                      <div style={{fontSize:12,color:"#fff",fontWeight:500}}>Trigger: <span style={{color:signal.color,fontWeight:600}}>{signal.trigger}</span></div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:4}}>Estructura Confirmada</div>
                    </>
                  ) : (
                    <>
                      <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.12em",color:"rgba(255,255,255,0.3)",marginBottom:2}}>SIN SETUP</div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>Sin confluencia sniper</div>
                    </>
                  )}
                </div>
                
                {/* RSI 14 (M5) en número plano */}
                {m5?.rsi != null && (
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",justifyContent:"center"}}>
                    <span style={{fontSize:9,color:"rgba(255,255,255,0.35)",letterSpacing:"0.05em"}}>RSI (M5)</span>
                    <span style={{
                      fontSize:13,fontWeight:700,marginTop:2,
                      color: getRsiColor(m5.rsi)
                    }}>{m5.rsi}</span>
                  </div>
                )}
              </div>

              {/* Estructura por marcos */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                {[["H1",h1],["M15",m15],["M5",m5]].map(([tf,d])=>(
                  <div key={tf} style={{background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"8px 10px",border:"0.5px solid rgba(255,255,255,0.07)"}}>
                    <div style={{fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:"0.1em",marginBottom:4}}>{tf}</div>
                    <div style={{fontSize:12,fontWeight:600,color:d ? trendCol(d.trend) : "#444"}}>
                      {d ? trendIcon(d.trend) : "—"} {d?.trend ?? "—"}
                    </div>
                    {d?.bos   && <div style={{fontSize:9,color:"#7C4DFF",marginTop:2}}>● BOS {d.bos}</div>}
                    {d?.choch && <div style={{fontSize:9,color:"#FF4081",marginTop:2}}>◈ CHoCH</div>}
                  </div>
                ))}
              </div>

              {/* Zonas de Oferta y Demanda */}
              {h1 && (
                <div style={{display:"flex",gap:8}}>
                  <div style={{flex:1,background:"rgba(0,230,118,0.07)",border:"0.5px solid rgba(0,230,118,0.2)",borderRadius:8,padding:"6px 10px"}}>
                    <div style={{fontSize:9,color:"rgba(0,230,118,0.6)",letterSpacing:"0.08em",marginBottom:2}}>DEMANDA H1</div>
                    <div style={{fontSize:12,color:"#00E676",fontVariantNumeric:"tabular-nums"}}>{h1.demandZone?.toFixed(2) ?? "—"}</div>
                  </div>
                  <div style={{flex:1,background:"rgba(255,82,82,0.07)",border:"0.5px solid rgba(255,82,82,0.2)",borderRadius:8,padding:"6px 10px"}}>
                    <div style={{fontSize:9,color:"rgba(255,82,82,0.6)",letterSpacing:"0.08em",marginBottom:2}}>OFERTA H1</div>
                    <div style={{fontSize:12,color:"#FF5252",fontVariantNumeric:"tabular-nums"}}>{h1.supplyZone?.toFixed(2) ?? "—"}</div>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    // ─── Aplicación Principal ─────────────────────────────────────────────────────
    function DerivScanner() {
      const [candles, setCandles]       = useState({});    // { symId: { h1, m15, m5 } }
      const [prices,  setPrices]        = useState({});    // { symId: price }
      const [status,  setStatus]        = useState("Conectando…");
      const [lastUpdate, setLastUpdate] = useState(null);
      const [filter, setFilter]         = useState("all"); // all | active
      const [trendPanelOpen, setTrendPanelOpen] = useState(false);
      const [activeTrendSym, setActiveTrendSym] = useState("1HZ50V");

      const wsRef  = useRef(null);
      const queue  = useRef([]);
      const active = useRef(null);
      const reconnectTimer = useRef(null);

      const processQueue = useCallback(() => {
        if (!queue.current.length || active.current) return;
        const req = queue.current.shift();
        active.current = req;
        wsRef.current?.send(JSON.stringify(req));
      }, []);

      const enqueue = useCallback((req) => {
        queue.current.push(req);
        processQueue();
      }, [processQueue]);

      const loadCandles = useCallback((symId, granularity, tfKey) => {
        enqueue({
          ticks_history: symId,
          style: "candles",
          granularity,
          count: 60,
          end: "latest",
          _meta: { symId, tfKey }
        });
      }, [enqueue]);

      const subscribeTicks = useCallback((symId) => {
        enqueue({ ticks: symId, subscribe: 1, _meta: { type: "tick", symId } });
      }, [enqueue]);

      const fetchAll = useCallback(() => {
        setStatus("Actualizando datos…");
        queue.current = [];
        active.current = null;
        SYMBOLS.forEach(s => {
          loadCandles(s.id, 3600, "h1");   // H1
          loadCandles(s.id, 900,  "m15");  // M15
          loadCandles(s.id, 300,  "m5");   // M5
          subscribeTicks(s.id);
        });
      }, [loadCandles, subscribeTicks]);

      const connect = useCallback(() => {
        if (wsRef.current) { wsRef.current.onclose = null; wsRef.current.close(); }
        const ws = new WebSocket(DERIV_WS);
        wsRef.current = ws;

        ws.onopen = () => {
          setStatus("Conectado ✦");
          fetchAll();
        };

        ws.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (msg.error) { active.current = null; processQueue(); return; }

          if (msg.msg_type === "candles") {
            const req = active.current;
            if (req?._meta) {
              const { symId, tfKey } = req._meta;
              setCandles(prev => ({
                ...prev,
                [symId]: { ...(prev[symId] || {}), [tfKey]: msg.candles }
              }));
            }
            active.current = null;
            setLastUpdate(new Date());
            processQueue();
          }

          if (msg.msg_type === "tick") {
            const { symbol, quote } = msg.tick;
            setPrices(prev => ({ ...prev, [symbol]: quote }));

            setCandles(prev => {
              const symData = prev[symbol];
              if (!symData) return prev;
              
              const updated = { ...symData };
              const timeframes = ["m5", "m15", "h1"];
              
              timeframes.forEach(tf => {
                if (updated[tf] && updated[tf].length > 0) {
                  const list = [...updated[tf]];
                  const lastIdx = list.length - 1;
                  const lastCandle = list[lastIdx];
                  list[lastIdx] = {
                    ...lastCandle,
                    close: quote,
                    high: Math.max(parseFloat(lastCandle.high), parseFloat(quote)),
                    low: Math.min(parseFloat(lastCandle.low), parseFloat(quote))
                  };
                  updated[tf] = list;
                }
              });
              
              return { ...prev, [symbol]: updated };
            });
          }

          if (msg.msg_type === "history") {
            active.current = null;
            processQueue();
          }
        };

        ws.onerror = () => setStatus("Error de conexión");
        ws.onclose = () => {
          setStatus("Reconectando…");
          reconnectTimer.current = setTimeout(connect, 4000);
        };
      }, [fetchAll, processQueue]);

      useEffect(() => {
        connect();
        const refreshInterval = setInterval(fetchAll, 60000); 
        return () => {
          clearInterval(refreshInterval);
          clearTimeout(reconnectTimer.current);
          wsRef.current?.close();
        };
      }, [connect, fetchAll]);

      const scored = SYMBOLS.map(s => {
        const d   = candles[s.id];
        const h1  = d?.h1  ? detectStructure(d.h1, 5)  : null;
        const m15 = d?.m15 ? detectStructure(d.m15, 4) : null;
        const m5  = d?.m5  ? detectStructure(d.m5, 3)  : null;
        const signal = getSniperSignal(h1, m15, m5);
        return { ...s, signal, h1, m15, m5 };
      });

      const filtered = scored.filter(s => {
        if (filter === "active") return s.signal !== null;
        return true;
      });

      const activeCount = scored.filter(s => s.signal !== null).length;
      const idleCount   = scored.filter(s => s.signal === null).length;

      const activeSymData = candles[activeTrendSym];
      const activeH1 = activeSymData?.h1 ? detectStructure(activeSymData.h1, 5) : null;
      const activeM5 = activeSymData?.m5 ? detectStructure(activeSymData.m5, 3) : null;

      let trendTipColor = "#00E676"; 
      if (activeM5) {
        const lastHigh = activeM5.supplyZone;
        const lastLow = activeM5.demandZone;
        const nearHigh = lastHigh && Math.abs(activeM5.lastClose - lastHigh) / lastHigh <= 0.01;
        const nearLow = lastLow && Math.abs(activeM5.lastClose - lastLow) / lastLow <= 0.01;
        
        if (nearHigh || nearLow) {
          trendTipColor = "#FFD740"; 
        }

        const isOppositeBOS = activeH1 && activeM5.bos && activeM5.bos !== activeH1.trend;
        if (activeM5.choch || isOppositeBOS) {
          trendTipColor = "#FF5252"; 
        }
      }

      return (
        <div style={{
          minHeight:"100vh", background:"#080C14",
          fontFamily:"'DM Sans',sans-serif",
          color:"#fff", padding:"24px 20px",
          backgroundImage:"radial-gradient(ellipse 80% 50% at 50% -10%, rgba(124,77,255,0.12), transparent), radial-gradient(ellipse 40% 30% at 80% 60%, rgba(0,229,255,0.06), transparent)"
        }}>
          <style>{`
            @keyframes spin { to { transform: rotate(360deg); } }
            @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
            * { box-sizing: border-box; margin: 0; padding: 0; }
            ::-webkit-scrollbar { width: 4px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
            button { cursor: pointer; border: none; outline: none; font-family: inherit; }
          `}</style>

          {/* Cabecera de la Aplicación */}
          <div style={{maxWidth:900,margin:"0 auto 28px"}}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:"#00E676",animation:"pulse 2s ease-in-out infinite",boxShadow:"0 0 8px #00E676"}}/>
                  <span style={{fontSize:10,color:"rgba(255,255,255,0.35)",letterSpacing:"0.15em",textTransform:"uppercase"}}>{status}</span>
                </div>
                <h1 style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:26,fontWeight:700,letterSpacing:"-0.02em",lineHeight:1.1,color:"#fff"}}>
                  Sniper PA
                  <span style={{color:"rgba(255,255,255,0.25)",fontWeight:400}}> · Estructuras Cascadas</span>
                </h1>
                <p style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginTop:5,letterSpacing:"0.02em"}}>
                  V50 · V75 · V100 · 1s — Filtros puros sin ambigüedad
                </p>
              </div>

              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8}}>
                <div style={{display:"flex",gap:8}}>
                  <div style={{background:"rgba(0,230,118,0.1)",border:"1px solid rgba(0,230,118,0.2)",borderRadius:8,padding:"6px 12px",textAlign:"center"}}>
                    <div style={{fontSize:18,fontWeight:700,color:"#00E676"}}>{activeCount}</div>
                    <div style={{fontSize:9,color:"rgba(0,230,118,0.6)",letterSpacing:"0.08em"}}>CON SETUP</div>
                  </div>
                  <div style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"6px 12px",textAlign:"center"}}>
                    <div style={{fontSize:18,fontWeight:700,color:"rgba(255,255,255,0.4)"}}>{idleCount}</div>
                    <div style={{fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:"0.08em"}}>BUSCANDO</div>
                  </div>
                </div>
                {lastUpdate && (
                  <span style={{fontSize:10,color:"rgba(255,255,255,0.2)"}}>
                    Actualizado {lastUpdate.toLocaleTimeString("es-ES")}
                  </span>
                )}
              </div>
            </div>

            {/* Barra de Filtros */}
            <div style={{display:"flex",gap:6,marginTop:16,flexWrap:"wrap",alignItems:"center"}}>
              {[["all","Todos"], ["active","Setups Sniper"]].map(([k,l])=>(
                <button key={k} onClick={()=>{ setFilter(k); setTrendPanelOpen(false); }} style={{
                  padding:"6px 14px",borderRadius:20,fontSize:11,fontWeight:500,letterSpacing:"0.06em",
                  background: filter===k && !trendPanelOpen ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.04)",
                  color: filter===k && !trendPanelOpen ? "#fff" : "rgba(255,255,255,0.4)",
                  border: `1px solid ${filter===k && !trendPanelOpen ?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.06)"}`,
                  transition:"all 0.2s"
                }}>{l}</button>
              ))}

              <button onClick={() => setTrendPanelOpen(!trendPanelOpen)} style={{
                padding:"6px 14px",borderRadius:20,fontSize:11,fontWeight:500,letterSpacing:"0.06em",
                background: trendPanelOpen ? "rgba(0,229,255,0.15)" : "rgba(255,255,255,0.04)",
                color: trendPanelOpen ? "#00E5FF" : "rgba(255,255,255,0.4)",
                border: `1px solid ${trendPanelOpen ? "rgba(0,229,255,0.3)" : "rgba(255,255,255,0.06)"}`,
                transition:"all 0.2s"
              }}>
                📈 Tendencia
              </button>

              <button onClick={fetchAll} style={{
                padding:"6px 14px",borderRadius:20,fontSize:11,fontWeight:500,letterSpacing:"0.06em",
                background:"rgba(124,77,255,0.15)",color:"rgba(124,77,255,0.9)",
                border:"1px solid rgba(124,77,255,0.3)",transition:"all 0.2s",marginLeft:"auto"
              }}>↺ Actualizar</button>
            </div>

            {/* Panel Desplegable de Tendencia en Vivo */}
            {trendPanelOpen && (
              <div style={{
                background: "linear-gradient(135deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.00) 100%)",
                border: "1px solid rgba(255,255,255,0.08)",
                borderRadius: 12,
                padding: "12px 16px",
                marginTop: 12,
                maxHeight: 125,
                display: "flex",
                flexDirection: "column",
                gap: 10,
                overflow: "hidden",
                transition: "all 0.3s ease-in-out"
              }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    {SYMBOLS.map(s => (
                      <button
                        key={s.id}
                        onClick={() => setActiveTrendSym(s.id)}
                        style={{
                          padding: "4px 10px",
                          borderRadius: 20,
                          fontSize: 10,
                          fontWeight: 600,
                          background: activeTrendSym === s.id ? s.color : "rgba(255,255,255,0.05)",
                          color: activeTrendSym === s.id ? "#080C14" : "rgba(255,255,255,0.6)",
                          transition: "all 0.2s ease"
                        }}
                      >
                        {s.label}
                      </button>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                    <span style={{ fontSize: 9, color: "rgba(255,255,255,0.4)", display: "flex", alignItems: "center", gap: 4 }}>
                      <span style={{ display: "inline-block", width: 6, height: 6, borderRadius: "50%", background: "#00E676" }} /> Estable
                    </span>
                    <span style={{ fontSize: 9, color: "rgba(255,255,255,0.4)", display: "flex", alignItems: "center", gap: 4 }}>
                      <span style={{ display: "inline-block", width: 6, height: 6, borderRadius: "50%", background: "#FFD740" }} /> Zona Cercana (1%)
                    </span>
                    <span style={{ fontSize: 9, color: "rgba(255,255,255,0.4)", display: "flex", alignItems: "center", gap: 4 }}>
                      <span style={{ display: "inline-block", width: 6, height: 6, borderRadius: "50%", background: "#FF5252" }} /> Posible Cambio
                    </span>
                  </div>
                </div>

                <LiveTrendChart
                  m5Data={candles[activeTrendSym]?.m5}
                  tipColor={trendTipColor}
                />
              </div>
            )}
          </div>

          {/* Grid de Tarjetas */}
          <div style={{maxWidth:900,margin:"0 auto",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:14}}>
            {filtered.map(sym => (
              <SymbolCard key={sym.id} sym={sym} data={candles[sym.id]} livePrice={prices[sym.id]}/>
            ))}
            {filtered.length === 0 && (
              <div style={{gridColumn:"1/-1",textAlign:"center",padding:"60px 20px",color:"rgba(255,255,255,0.2)",fontSize:13}}>
                No hay setups válidos en este momento que cumplan con la cascada sniper.
              </div>
            )}
          </div>

          {/* Leyenda */}
          <div style={{maxWidth:900,margin:"28px auto 0",background:"rgba(255,255,255,0.01)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:12,padding:"16px 20px"}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",letterSpacing:"0.12em",marginBottom:10,textTransform:"uppercase"}}>Cascada Estructural Sniper</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",lineHeight:1.6}}>
              Este escáner opera bajo la filosofía de <strong style={{color:"#00E676"}}>Filtros Duros en Cascada</strong>. Ninguna señal parcial o incompleta se puntúa; si un solo componente estructural falla, el setup se descarta automáticamente.
              <ul style={{marginTop:6, paddingLeft:14, display:"flex", flexDirection:"column", gap:2}}>
                <li>• H1 define la tendencia dominante y las zonas de oferta/demanda con ventanas de 5 velas.</li>
                <li>• M15 valida la alineación tendencial y de quiebre (BOS) con al menos 4 swings confirmados.</li>
                <li>• El precio debe encontrarse en la zona óptima de H1 (<span style={{color:"#00E5FF"}}>tolerancia ±0.2%</span>).</li>
                <li>• M5 entrega el gatillo final en la dirección mayoritaria a través de un BOS o CHoCH.</li>
              </ul>
            </div>
          </div>

          {/* Footer */}
          <div style={{maxWidth:900,margin:"16px auto 0",textAlign:"center",padding:"12px 0"}}>
            <p style={{fontSize:10,color:"rgba(255,255,255,0.15)",letterSpacing:"0.08em",lineHeight:1.8}}>
              FILTRADO EN CASCADA · MÁXIMA PRECISIÓN · SIN AMBIGÜEDAD
            </p>
          </div>
        </div>
      );
    }

    // Inicializar la App de React
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<DerivScanner />);
  </script>
</body>
</html>
